# Changes from TESTPANEL_GAP_ANALYSIS fix pass
# Generated: 2026-03-07 (Round 2 — TestPanel gaps)

module: multiple (framework + example)
changes:
  # TP01 — Scale transform for C++ normalized coordinates
  - fix_id: TP01-painter
    action: ADDED
    lines_after: painter.rs:143-153
    description: >
      Added offset() getter and set_offset(ox, oy) method to Painter.
      Enables absolute (non-cumulative) positioning for each panel,
      fixing a latent translate-accumulation bug for nested panels.
    extract_branches_addressed:
      - "C++ SetTransformation sets absolute origin + scale per panel"

  - fix_id: TP01-view
    action: MODIFIED
    lines_before: view.rs:1457-1505
    lines_after: view.rs:1457-1516
    description: >
      Changed paint() to capture the base painter offset before recursion
      and pass it through paint_panel_recursive(). Each panel now uses
      set_offset(base_ox + vx, base_oy + vy) instead of cumulative
      translate(vx, vy). Fixes nested panel positioning bug where
      child offsets accumulated incorrectly from parents.
    extract_branches_addressed:
      - "C++ SetTransformation uses absolute ViewedX/Y, not relative to parent"

  - fix_id: TP01-examples
    action: MODIFIED
    lines_after: test_panel.rs:568-620,902-916,971-993,1209-1212
    description: >
      Added push_state/scale(w,w)/pop_state wrapper to TestPanel,
      TkTestGrpPanel, TkTestPanel, and PolyDrawPanel paint() methods.
      The scale maps pixel coordinates to C++ normalized space (0..1,
      0..tallness). Replaced w with 1.0 and h with h/w where needed.
      Widget behaviors (Button, TextField, etc.) continue using pixel
      coordinates unchanged.
    extract_branches_addressed:
      - "C++ GetWidth()=1.0, GetHeight()=tallness for all painting"
      - "Content painted in ~1x1 pixel area due to coordinate mismatch"

  # TP07 — Wheel delta preservation
  - fix_id: TP07
    action: MODIFIED
    lines_before: app.rs:194-196
    lines_after: app.rs:194-204
    description: >
      Added guard to skip overwriting mouse_x/y for WheelUp/WheelDown/
      WheelLeft/WheelRight events. These events encode scroll delta in
      mouse_x/y fields which was being replaced with the persistent
      mouse position, losing the delta magnitude.
    extract_branches_addressed:
      - "Scroll delta magnitude lost before any VIF or panel sees it"

  # TP02 — Wheel zoom
  - fix_id: TP02
    action: MODIFIED
    lines_before: input_filter.rs:263-275
    lines_after: input_filter.rs:263-289
    description: >
      Added WheelUp/WheelDown handling to MouseZoomScrollVIF::filter().
      On wheel events, computes zoom factor from self.zoom_speed and
      calls view.zoom() centered at the current mouse position.
      The update_wheel_zoom_speed() method with acceleration was already
      implemented but never wired — this uses the simple zoom_speed
      factor for now.
    extract_branches_addressed:
      - "No WheelUp/WheelDown handling in filter()"
      - "update_wheel_zoom_speed exists but is never called from filter()"

  # TP03 — Focusable default
  - fix_id: TP03
    action: MODIFIED
    lines_before: tree.rs:209
    lines_after: tree.rs:209
    description: >
      Changed PanelData default focusable from false to true, matching
      C++ emPanel which defaults to focusable=true. Updated 4 tree.rs
      tests to explicitly set non-focusable panels that the test tree
      structure requires.
    extract_branches_addressed:
      - "C++ emPanel defaults to focusable=true"
      - "No panel receives events because get_focusable_panel_at returns None"

  # TP04 — Mouse coordinate transform
  - fix_id: TP04
    action: MODIFIED
    lines_before: zui_window.rs:379-403
    lines_after: zui_window.rs:379-415
    description: >
      In dispatch_input, mouse coordinates are now transformed from
      viewport pixels to panel-local space using tree.view_to_panel_x/y()
      before calling behavior.input(). During parent-chain bubbling,
      coordinates are re-transformed for each parent's coordinate space.
    extract_branches_addressed:
      - "mx, my already in panel-local coordinates (0..1, 0..h) in C++"
      - "Rust dispatch_input passes raw viewport-pixel coordinates"

design_decisions_deferred:
  - TP05-D1: Focus highlight appearance
  - TP06-D1: DefaultTouchVIF (click-to-visit navigation)
  - TP08-D1: GetViewCondition early-return optimization
  - TP09-D1: Notice invalidation (may be covered by framework)
  - TP10-14-D1: Minor parity differences

notes:
  - Widget paint methods (Button, TextField, etc.) still use pixel coordinates.
    The framework passes pixel (vw, vh) to paint(). C++ ported behaviors that
    need normalized coordinates apply their own push_state/scale/pop_state.
    This is a pragmatic approach that avoids touching 12+ widget paint methods.
  - The translate-accumulation bug (TP01-view) was a pre-existing issue that
    would cause incorrect rendering for panels nested > 1 level deep. Fixed
    as part of TP01 since it shares the same code path.
